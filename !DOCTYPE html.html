<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online License Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* Top Header */
.header {
    background: #1b6b63;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
    position: relative;
}

.header img {
    position: absolute;
    left: 20px;
    top: 10px;
    height: 40px;
}

/* Center Card */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

.card {
    background: #fff;
    padding: 30px;
    width: 400px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

/* Logo */
.logo {
    width: 80px;
    margin-bottom: 10px;
}

/* Titles */
.small-title {
    font-size: 14px;
    color: #333;
}

h2 {
    margin: 10px 0 20px;
}

/* Inputs */
.input-group {
    text-align: left;
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    margin-bottom: 5px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Options */
.options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Buttons */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    margin-bottom: 10px;
    font-size: 16px;
    cursor: pointer;
}

.btn-primary {
    background: #1b6b63;
    color: white;
}

.btn-secondary {
    background: white;
    border: 2px solid #1b6b63;
    color: #1b6b63;
}

/* Hover */
.btn:hover {
    opacity: 0.9;
}
</style>

</head>
<body>

<div class="header">
    <img src="logo.png" alt="Logo">
    Ministry of Trade and Regional Integration
</div>

<div class="container">
    <div class="card">

        <img src="logo.png" class="logo" alt="Logo">

        <div class="small-title">Online License Registration</div>
        <h2>Sign in to your account</h2>

        <form action="login.php" method="POST">

            <div class="input-group">
                <label>Username / Tin</label>
                <input type="text" name="username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox"> Remember My Login
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button class="btn btn-primary" type="submit">Sign in</button>
            <button class="btn btn-secondary" type="button">Register</button>

        </form>

    </div>
</div>

</body>
</html>
